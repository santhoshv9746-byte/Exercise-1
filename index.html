<!DOCTYPE html>
<html>

<head>
    <title>JavaScript Exercises</title>
</head>

<body>


    <h1>Exercise 1</h1>

    <input type="number" id="weight" placeholder="Enter baggage weight">

    <button onclick="check()">
        Check
    </button>

    <br><br>

    <input type="number"
           id="removed"
           placeholder="Remove weight"
           style="display:none;">

    <button id="remB"
            onclick="removeWeight()"
            style="display:none;">
        Remove
    </button>

    <hr>



    <h1>Exercise 2</h1>

    <button onclick="euler1()">
        Euler Q1
    </button>

    <br><br>

    <input type="number" id="a" placeholder="Enter a">

    <input type="number" id="b" placeholder="Enter b">

    <input type="number" id="n" placeholder="Enter n">

    <button onclick="eulerCustom()">
        Custom
    </button>

    <hr>



    <h1>Exercise 3</h1>

    <h3>Part 1</h3>

    <input type="number" id="a1" placeholder="A">

    <input type="number" id="b1" placeholder="B">

    <input type="text"
           id="l"
           placeholder="Example: 1 2 3 4 5">

    <button onclick="eulerlist()">
        Run Part 1
    </button>

    <br><br>

    <h3>Part 2 & 3</h3>

    <input type="text"
           id="aList"
           placeholder="Example: 2 3 5">

    <input type="text"
           id="mList"
           placeholder="Example: 1 2 3 4 5 6">

    <button onclick="euler2Lists()">
        Run Part 2
    </button>

    <button onclick="euler2Lists1()">
        Run Part 3
    </button>
