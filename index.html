<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Exercises</title>

    <script src="ex1.js"></script>
    <script src="ex2.js"></script>
    <script src="ex3.js"></script>
</head>

<body>

    <h1>Exercise 1</h1>

    <p>
        <input type="text" id="weight" placeholder="Enter baggage weight">
        <button onclick="check()">Check Baggage</button>
    </p>

    <p>
        <input type="text" id="removed" placeholder="Weight to remove" style="display:none;">
        
        <button id="remB"
                onclick="removeWeight()"
                style="display:none;">
            Remove this much baggage (kg)
        </button>
    </p>


    <h1>Exercise 2</h1>

    <p>
        <button onclick="euler1()">
            Press for solution to Project Euler
        </button>
    </p>

    <p>
        <label>A</label>
        <input type="text" id="a">

        <label>B</label>
        <input type="text" id="b">

        <label>N</label>
        <input type="text" id="n">
    </p>

    <p>
        <button onclick="eulerCustom()">
            Press for custom sum of multiples
        </button>
    </p>

    <p>
        Find the sum of multiples of a or b less than n,
        where a, b and n are integer parameters.
    </p>


    <h1>Exercise 3</h1>

    <h3>Part 1</h3>

    <p>
        Sum of multiples of a or b in list l.
    </p>

    <p>
        <label>A</label>
        <input type="text" id="a1"><br><br>

        <label>B</label>
        <input type="text" id="b1"><br><br>

        <label>L</label>
        <input type="text" id="l"
               placeholder="Example: 1 2 3 4 5">
    </p>

    <p>
        <button onclick="eulerlist()">
            Run Exercise 3 - Part 1
        </button>
    </p>


    <h3>Part 2 & Part 3</h3>

    <p>
        Compute the sum of multiples of elements in list a,
        found in list l.
    </p>

    <p>
        <label>A List</label>
        <input type="text" id="aList"
               placeholder="Example: 2 3 5">

        <label>L List</label>
        <input type="text" id="mList"
               placeholder="Example: 1 2 3 4 5 6">
    </p>

    <p>
        <button onclick="euler2Lists()">
            Run Part 2
        </button>

        <button onclick="euler2Lists1()">
            Run Part 3
        </button>
    </p>

</body>
</html>
