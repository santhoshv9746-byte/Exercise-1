<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Exercises</title>

    <!-- Load JS files -->
    <script src="ex1.js" defer></script>
    <script src="ex2.js" defer></script>
    <script src="ex3.js" defer></script>
</head>

<body>

    <!-- ================= EXERCISE 1 ================= -->
    <h1>Exercise 1 - Baggage Check</h1>

    <input type="text" id="weight" placeholder="Enter baggage weight">

    <button onclick="check()">Check Baggage</button>

    <br><br>

    <input type="text" id="removed" placeholder="Enter weight to remove" style="display:none;">

    <button id="remB" onclick="removeWeight()" style="display:none;">
        Remove baggage
    </button>


    <!-- ================= EXERCISE 2 ================= -->
    <h1>Exercise 2 - Project Euler</h1>

    <button onclick="euler1()">
        Solve Euler Q1
    </button>

    <br><br>

    <input type="text" id="a" placeholder="A">
    <input type="text" id="b" placeholder="B">
    <input type="text" id="n" placeholder="N">

    <button onclick="eulerCustom()">
        Custom Sum of Multiples
    </button>


    <!-- ================= EXERCISE 3 ================= -->
    <h1>Exercise 3 - Lists</h1>

    <h3>Part 1</h3>

    <input type="text" id="a1" placeholder="A">
    <input type="text" id="b1" placeholder="B">
    <input type="text" id="l" placeholder="List (space separated)">

    <button onclick="eulerlist()">
        Run Part 1
    </button>


    <h3>Part 2 & 3</h3>

    <input type="text" id="aList" placeholder="A list (space separated)">
    <input type="text" id="mList" placeholder="L list (space separated)">

    <button onclick="euler2Lists()">
        Run Part 2
    </button>

    <button onclick="euler2Lists1()">
        Run Part 3
    </button>

</body>
</html>
