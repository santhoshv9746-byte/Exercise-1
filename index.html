<!DOCTYPE html>
<html>

<head>
    <title>JavaScript Exercises</title>
</head>

<body>

    <h1>Exercise 1</h1>

    <input type="text" id="weight" placeholder="Enter weight">

    <button onclick="check()">
        Check Baggage
    </button>

    <br><br>

    <input type="text"
           id="removed"
           placeholder="Remove weight"
           style="display:none;">

    <button id="remB"
            onclick="removeWeight()"
            style="display:none;">
        Remove Weight
    </button>

    <script>

        let maxWeight = 15;

        let check = () => {

            let weight =
                parseFloat(
                    document.getElementById('weight').value
                );

            if (isNaN(weight)) {
                alert("Enter valid number");
                return;
            }

            if (weight > maxWeight) {

                alert("Overweight baggage!");

                document.getElementById('removed').style.display = 'block';

                document.getElementById('remB').style.display = 'block';

            }
            else {

                alert("Weight OK");

            }
        }

        let removeWeight = () => {

            let weight =
                parseFloat(
                    document.getElementById('weight').value
                );

            let removed =
                parseFloat(
                    document.getElementById('removed').value
                );

            let newWeight = weight - removed;

            document.getElementById('weight').value = newWeight;

            if (newWeight <= maxWeight) {

                alert("Now OK to proceed");

            }
            else {

                alert("Still overweight");

            }
        }

    </script>

</body>

</html>
